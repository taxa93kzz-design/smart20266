<!doctype html>
<html lang="kk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Информатика БЖБ онлайн тест</title>
<style>
:root{--bg:#f5f7f4;--card:#fff;--ink:#17211c;--muted:#627168;--line:#d7e0da;--green:#1d8f6f;--dark:#105d4a;--red:#b23a3a;--amber:#9d641f;--soft:#eef4f1}*{box-sizing:border-box}body{margin:0;background:linear-gradient(#eef4f1,#f5f7f4);font-family:Arial,Helvetica,sans-serif;color:var(--ink);line-height:1.5}.app{max-width:1100px;margin:auto;padding:24px 14px}.top{display:flex;justify-content:space-between;gap:14px;align-items:center;margin-bottom:14px}.brand{display:flex;gap:12px;align-items:center}.mark{width:46px;height:46px;border-radius:8px;background:var(--green);color:#fff;display:grid;place-items:center;font-weight:700}h1{font-size:24px;margin:0}.sub{margin:3px 0 0;color:var(--muted);font-size:14px}.pill{border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 10px;color:var(--muted);font-size:13px}.modes{display:flex;gap:8px;background:var(--soft);border:1px solid var(--line);border-radius:8px;padding:8px;margin-bottom:14px;overflow:auto}button,input,textarea,select{font:inherit}.mode,.btn,.mini{border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);padding:10px 12px;cursor:pointer}.mode.active,.btn.primary{background:var(--green);border-color:var(--green);color:#fff;font-weight:700}.grid{display:grid;grid-template-columns:360px 1fr;gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:8px;box-shadow:0 14px 38px rgba(23,33,28,.08);overflow:hidden}.head{background:var(--soft);border-bottom:1px solid var(--line);padding:15px 17px}.head h2{margin:0;font-size:18px}.head p{margin:4px 0 0;color:var(--muted);font-size:13px}.body{padding:17px}.form{display:grid;gap:12px}.field{display:grid;gap:6px}label{font-size:13px;font-weight:700}input,textarea,select{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px;outline:none;background:#fff}textarea{min-height:100px;resize:vertical}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.full{grid-column:1/-1}.doc{white-space:pre-wrap;font-size:14px}.hidden{display:none!important}.meta{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.progress{height:8px;background:#e2e9e5;border-radius:99px;overflow:hidden;margin:12px 0}.progress div{height:100%;background:var(--green);width:0}.qtext{font-size:18px;font-weight:700}.opts{display:grid;gap:9px}.opt{display:flex;gap:10px;border:1px solid var(--line);border-radius:8px;padding:11px;cursor:pointer}.opt:hover{background:#f8faf8}.opt input{width:18px;height:18px}.code{font-family:Consolas,monospace;min-height:150px}.nav{display:flex;justify-content:space-between;gap:10px;margin-top:14px;flex-wrap:wrap}.score{width:118px;height:118px;border-radius:50%;border:8px solid #dceee7;display:grid;place-items:center;margin:0 auto 14px;font-size:27px;font-weight:700;color:var(--dark)}.review{display:grid;gap:9px;margin-top:14px}.review div{border:1px solid var(--line);border-radius:8px;padding:10px;background:#fbfcfb}.ok{color:var(--dark);font-weight:700}.bad{color:var(--red);font-weight:700}.manual{color:var(--amber);font-weight:700}table{width:100%;border-collapse:collapse;font-size:14px}th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left;vertical-align:top}th{background:var(--soft)}@media(max-width:850px){.grid{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}@media(max-width:520px){.two,.actions{grid-template-columns:1fr}h1{font-size:21px}}
</style>
</head>
<body>
<main class="app">
<header class="top"><div class="brand"><div class="mark">БЖБ</div><div><h1>Информатика БЖБ онлайн тест</h1><p class="sub">Мұғалім тест құрастырады, оқушы сайтта орындайды, нәтиже сақталады</p></div></div><div class="pill" id="status">Дайын</div></header>
<nav class="modes"><button class="mode active" data-mode="teacher">Мұғалім құрастыру</button><button class="mode" data-mode="student">Оқушы орындау</button><button class="mode" data-mode="results">Нәтижелер</button></nav>
<section id="teacher" class="grid">
<aside class="card"><div class="head"><h2>БЖБ параметрлері</h2><p>Өрістерді толтырып, онлайн тестті жаңартыңыз.</p></div><div class="body"><form class="form" id="form">
<div class="two"><div class="field"><label>Сынып</label><select id="grade"><option>5</option><option>6</option><option selected>7</option><option>8</option><option>9</option><option>10</option><option>11</option></select></div><div class="field"><label>Жалпы балл</label><input id="points" type="number" min="10" max="20" value="15"></div></div>
<div class="field"><label>Бөлім атауы</label><input id="section" value="Python тілінде алгоритмдерді программалау"></div>
<div class="field"><label>Оқу мақсаттары</label><textarea id="objectives">7.3.2.1 Python тілінде тармақталған алгоритмдерді жазу
7.3.3.1 деректер типтерін ажырату</textarea></div>
<div class="two"><div class="field"><label>Уақыт, минут</label><input id="minutes" type="number" min="5" max="90" value="20"></div><div class="field"><label>Python</label><select id="python"><option value="yes">Код тапсырмасы бар</option><option value="no">Код тапсырмасы жоқ</option></select></div></div>
<div class="actions"><button class="btn primary full" type="submit">Тестті жаңарту</button><button class="btn" type="button" id="studentBtn">Оқушы режимі</button><button class="btn" type="button" id="copyBtn">Мәтінді көшіру</button><button class="btn" type="button" id="sampleBtn">Үлгі</button></div>
</form></div></aside>
<section class="card"><div class="head"><h2>Дайын мәтін</h2><p id="summary"></p></div><div class="body"><div class="doc" id="doc"></div></div></section>
</section>
<section id="student" class="hidden">
<div id="start" class="card"><div class="head"><h2>Оқушы тесті</h2><p id="meta"></p></div><div class="body"><div class="two"><div class="field"><label>Оқушының аты-жөні</label><input id="sname" placeholder="Мысалы: Айдана Ержан"></div><div class="field"><label>Сыныбы</label><input id="sclass" placeholder="Мысалы: 7А"></div></div><div class="meta" id="info"></div><button class="btn primary full" id="startBtn">Тестті бастау</button></div></div>
<div id="quiz" class="card hidden"><div class="head"><h2 id="quizTitle"></h2><p><span id="who"></span> <span id="timer"></span></p></div><div class="body"><div class="pill" id="qnum"></div><div class="progress"><div id="bar"></div></div><p class="qtext" id="qtext"></p><div id="answer"></div><div class="nav"><button class="btn" id="prev">Алдыңғы</button><button class="btn" id="next">Келесі</button><button class="btn primary" id="finish">Тестті аяқтау</button></div></div></div>
<div id="result" class="card hidden"><div class="head"><h2>Нәтиже</h2><p id="resWho"></p></div><div class="body"><div class="score" id="score">0/15</div><p id="resText" style="text-align:center"></p><div class="actions"><button class="btn" id="again">Қайта тапсыру</button><button class="btn primary" id="showResults">Нәтижелер</button></div><div class="review" id="review"></div></div></div>
</section>
<section id="results" class="card hidden"><div class="head"><h2>Оқушылар нәтижесі</h2><p>Нәтижелер осы браузерде сақталады.</p></div><div class="body"><div class="actions"><button class="btn" id="csv">CSV жүктеу</button><button class="btn" id="clear">Тазалау</button></div><div id="table" style="margin-top:12px"></div></div></section>
</main>
<script>
const letters=['A','B','C','D'],store='bjb_online_results';let data,tasks=[],docs='',cur=0,ans=[],left=0,timer=null,last=null;
const $=id=>document.getElementById(id);function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function mode(m){document.querySelectorAll('.mode').forEach(b=>b.classList.toggle('active',b.dataset.mode==m));['teacher','student','results'].forEach(id=>$(id).classList.toggle('hidden',id!=m));if(m=='student')startScreen();if(m=='results')renderResults()}
document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>mode(b.dataset.mode));
function vals(){return{grade:$('grade').value,points:+$('points').value||15,section:$('section').value||'Информатика бөлімі',objectives:$('objectives').value||'Оқу мақсаты',minutes:+$('minutes').value||20,py:$('python').value=='yes'}}
function makeTasks(d){let p=d.points>=18?[2,2,3,3,4,d.points-14]:d.points>=14?[1,1,2,2,3,d.points-9]:[1,1,1,2,2,d.points-7];let arr=[
{t:'choice',q:'Алгоритм дегеніміз не?',o:['Есепті шешуге арналған нақты қадамдар тізбегі','Компьютер құрылғысы','Файл атауы','Интернет желісі'],a:0,p:p[0],k:'A'},
{t:'choice',q:'Python тілінде бүтін сан типі қалай аталады?',o:['int','float','str','bool'],a:0,p:p[1],k:'A'},
{t:'choice',q:'Шартты оператор қай кезде қолданылады?',o:['Таңдау жасау қажет болғанда','Тек мәтін шығару үшін','Файл өшіру үшін','Компьютер қосу үшін'],a:0,p:p[2],k:'A'},
{t:'choice',q:'Циклдің негізгі қызметі қандай?',o:['Қайталанатын әрекеттерді орындау','Бір ғана команда жазу','Файл атауын өзгерту','Сурет салу'],a:0,p:p[3],k:'A'},
{t:'short',q:'Python тілінде экранға мәтін шығаратын команданы жазыңыз.',p:p[4],k:'print, print(), print("мәтін")'},
{t:'code',q:d.py?'Python кодын жазыңыз: екі бүтін сан енгізіледі. Егер бірінші сан екінші саннан үлкен болса, "Бірінші сан үлкен", әйтпесе "Екінші сан үлкен немесе тең" мәтінін шығарыңыз.':'Бөлім бойынша практикалық шешім ұсынып, орындалу ретін жазыңыз.',p:p[5],k:d.py?'int input, if, else, print қолдану':'Мұғалім критерий бойынша тексереді'}];return arr}
function gen(){data=vals();tasks=makeTasks(data);docs=`=== ОҚУШЫҒА АРНАЛҒАН НҰСҚА ===\nПәні: Информатика\nСынып: ${data.grade}\nБөлім: ${data.section}\nОқу мақсаттары:\n${data.objectives}\nЖалпы балл: ${data.points}\nУақыт: ${data.minutes} минут\n\n`+tasks.map((x,i)=>`${i+1}. ${x.t=='choice'?'Көп таңдаулы':x.t=='short'?'Қысқа жауап':'Практикалық тапсырма'} (${x.p} балл)\n${x.q}${x.o?'\n'+x.o.map((v,j)=>letters[j]+'. '+v).join('\n'):''}`).join('\n\n')+`\n\n=== МҰҒАЛІМГЕ АРНАЛҒАН НҰСҚА ===\nДұрыс жауаптар және кілттер:\n`+tasks.map((x,i)=>`${i+1}. ${x.k} (${x.p} балл)`).join('\n')+`\n\nПрактикалық тапсырма критерийлері: деректерді дұрыс енгізу, шартты операторды қолдану, нәтижені шығару, кодтың түсінікті болуы.`;$('doc').textContent=docs;$('summary').textContent=`${data.grade}-сынып, ${data.points} балл, ${tasks.length} тапсырма, ${data.minutes} минут`;$('status').textContent='Онлайн тест дайын';startScreen()}
function startScreen(){clearInterval(timer);if(!data)gen();$('start').classList.remove('hidden');$('quiz').classList.add('hidden');$('result').classList.add('hidden');$('meta').textContent=`${data.grade}-сынып | ${data.section}`;$('info').innerHTML=`<span class="pill">${tasks.length} тапсырма</span><span class="pill">${data.points} балл</span><span class="pill">${data.minutes} минут</span><span class="pill">Практикалық жұмысты мұғалім тексереді</span>`}
function start(){if(!$('sname').value.trim())return alert('Аты-жөнін жазыңыз');if(!$('sclass').value.trim())return alert('Сыныбын жазыңыз');cur=0;ans=tasks.map(()=>"");left=data.minutes*60;$('start').classList.add('hidden');$('quiz').classList.remove('hidden');$('quizTitle').textContent=data.section;$('who').textContent=$('sname').value+', '+$('sclass').value;tick();timer=setInterval(()=>{left--;tick();if(left<=0)finish()},1000);renderQ()}
function tick(){let m=Math.max(0,Math.floor(left/60)),s=Math.max(0,left%60);$('timer').textContent='| Уақыт: '+m+':'+String(s).padStart(2,'0')}
function save(){let t=tasks[cur];if(t.t=='choice'){let c=document.querySelector('input[name=opt]:checked');ans[cur]=c?c.value:''}else ans[cur]=$('written')?$('written').value:''}
function renderQ(){let t=tasks[cur];$('qnum').textContent=`${cur+1}/${tasks.length} | ${t.p} балл`;$('bar').style.width=((cur+1)/tasks.length*100)+'%';$('qtext').textContent=t.q;if(t.t=='choice')$('answer').innerHTML='<div class="opts">'+t.o.map((v,i)=>`<label class="opt"><input type="radio" name="opt" value="${i}" ${ans[cur]==i?'checked':''}><span><b>${letters[i]}.</b> ${v}</span></label>`).join('')+'</div>';else $('answer').innerHTML=`<textarea id="written" class="${t.t=='code'?'code':''}" placeholder="Жауабыңызды жазыңыз...">${esc(ans[cur])}</textarea>`;$('prev').disabled=cur==0;$('next').classList.toggle('hidden',cur==tasks.length-1);$('finish').classList.toggle('hidden',cur!=tasks.length-1)}
function grade(){let auto=0,manual=0,rev=[];tasks.forEach((t,i)=>{let a=ans[i];if(t.t=='choice'){let ok=+a===t.a;if(ok)auto+=t.p;rev.push([i+1,ok?'Дұрыс':'Қате',ok?t.p:0,t.p,a===''?'Жауап жоқ':letters[+a],t.k])}else if(t.t=='short'){let ok=a.toLowerCase().replace(/\s/g,'').includes('print');if(ok)auto+=t.p;rev.push([i+1,ok?'Дұрыс':'Қате',ok?t.p:0,t.p,a||'Жауап жоқ',t.k])}else{manual+=t.p;rev.push([i+1,'Мұғалім тексереді',0,t.p,a||'Жауап жоқ',t.k])}});return{auto,manual,rev}}
function finish(){save();clearInterval(timer);let g=grade();last={date:new Date().toLocaleString('kk-KZ'),name:$('sname').value,klass:$('sclass').value,section:data.section,total:data.points,auto:g.auto,manual:g.manual,review:g.rev};let all=JSON.parse(localStorage.getItem(store)||'[]');all.unshift(last);localStorage.setItem(store,JSON.stringify(all));$('quiz').classList.add('hidden');$('result').classList.remove('hidden');$('resWho').textContent=last.name+', '+last.klass+' | '+last.date;$('score').textContent=last.auto+'/'+last.total;$('resText').innerHTML=`Автоматты балл: <b>${last.auto}</b>. Мұғалім тексеретін балл: <b>${last.manual}</b>.`;$('review').innerHTML=last.review.map(r=>`<div><b>${r[0]}-тапсырма:</b> <span class="${r[1]=='Дұрыс'?'ok':r[1]=='Қате'?'bad':'manual'}">${r[1]}</span> (${r[2]}/${r[3]})<br>Оқушы жауабы: ${esc(r[4])}<br>Кілт: ${esc(r[5])}</div>`).join('')}
function renderResults(){let all=JSON.parse(localStorage.getItem(store)||'[]');if(!all.length){$('table').innerHTML='<p>Әзірге нәтиже жоқ.</p>';return}$('table').innerHTML='<table><thead><tr><th>Оқушы</th><th>Сынып</th><th>Бөлім</th><th>Авто балл</th><th>Мұғалім тексереді</th><th>Күні</th></tr></thead><tbody>'+all.map(r=>`<tr><td>${esc(r.name)}</td><td>${esc(r.klass)}</td><td>${esc(r.section)}</td><td><b>${r.auto}/${r.total}</b></td><td>${r.manual} балл</td><td>${esc(r.date)}</td></tr>`).join('')+'</tbody></table>'}
function csv(){let all=JSON.parse(localStorage.getItem(store)||'[]');if(!all.length)return alert('Нәтиже жоқ');let rows=[['Аты-жөні','Сыныбы','Бөлім','Авто балл','Жалпы балл','Мұғалім тексереді','Күні'],...all.map(r=>[r.name,r.klass,r.section,r.auto,r.total,r.manual,r.date])];let text='\ufeff'+rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(';')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'text/csv'}));a.download='bjb_results.csv';a.click()}
$('form').onsubmit=e=>{e.preventDefault();gen()};$('studentBtn').onclick=()=>mode('student');$('startBtn').onclick=start;$('prev').onclick=()=>{save();if(cur>0)cur--;renderQ()};$('next').onclick=()=>{save();if(cur<tasks.length-1)cur++;renderQ()};$('finish').onclick=finish;$('again').onclick=startScreen;$('showResults').onclick=()=>mode('results');$('csv').onclick=csv;$('clear').onclick=()=>{if(confirm('Нәтижелерді өшіресіз бе?')){localStorage.removeItem(store);renderResults()}};$('copyBtn').onclick=()=>navigator.clipboard.writeText(docs);$('sampleBtn').onclick=()=>{ $('grade').value='8';$('points').value='20';$('section').value='Python тілінде циклдік алгоритмдерді программалау';$('objectives').value='8.3.3.1 Python тілінде цикл операторларын қолдану\n8.3.2.1 алгоритм трассировкасын жүзеге асыру';$('minutes').value='25';gen()};gen();
</script>
</body>
</html>
